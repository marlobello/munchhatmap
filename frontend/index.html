<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MunchHat Map</title>
  <link rel="icon" type="image/png" href="/munchhat.png" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- Leaflet.markercluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
        integrity="sha384-pmjIAcz2bAn0xukfxADbZIb3t8oRT9Sv0rvO+BR5Csr6Dhqq+nZs59P0pPKQJkEV" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
        integrity="sha384-wgw+aLYNQ7dlhK47ZPK7FRACiq7ROZwgFNg0m04avm4CaXS+Z9Y7nMu8yNjBKYC+" crossorigin="anonymous" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }
    #map { width: 100vw; height: 100vh; }

    #header {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      border-radius: 8px;
      padding: 10px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }
    #header h1 { font-size: 1.1rem; }
    #pin-count { font-size: 0.85rem; color: #666; }

    /* Stats toggle button */
    #stats-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      line-height: 1;
    }
    #stats-toggle:hover { background: #f0f0f0; }

    /* Stats panel */
    #stats-panel {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 999;
      width: 300px;
      background: #fff;
      box-shadow: -4px 0 16px rgba(0,0,0,0.15);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #stats-panel.open { transform: translateX(0); }

    .stats-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }
    .stats-header h2 { font-size: 1rem; margin: 0; }
    #stats-close {
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      color: #666;
      padding: 2px 6px;
      border-radius: 4px;
    }
    #stats-close:hover { background: #f0f0f0; }

    #stats-content {
      overflow-y: auto;
      flex: 1;
      padding: 12px 16px;
    }
    .stats-section { margin-bottom: 20px; }
    .stats-section h3 { font-size: 0.9rem; margin-bottom: 8px; color: #333; }
    .stats-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 0.85rem;
    }
    .stats-rank { width: 24px; text-align: center; flex-shrink: 0; font-size: 0.9rem; }
    .stats-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .stats-count {
      font-weight: 600;
      color: #5865F2;
      flex-shrink: 0;
    }
    .stats-empty { font-size: 0.85rem; color: #999; font-style: italic; }

    .popup-content {
      max-width: 260px;
      font-family: sans-serif;
    }
    .popup-content img {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 8px;
      display: block;
    }
    .popup-content .meta {
      font-size: 0.8rem;
      color: #555;
      margin-top: 3px;
    }
    .popup-content .caption {
      font-size: 0.9rem;
      margin: 6px 0;
      word-break: break-word;
    }
    .popup-content a {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.8rem;
      color: #5865F2;
      text-decoration: none;
    }
    .popup-content a:hover { text-decoration: underline; }
    .popup-img-error {
      text-align: center;
      padding: 8px 0 4px;
    }
    .popup-img-error-icon {
      width: 48px;
      height: auto;
      opacity: 0.4;
      margin-bottom: 4px;
    }
    .popup-img-error p {
      font-size: 0.8rem;
      color: #888;
      margin: 4px 0 6px;
    }

    /* ── Auth gate overlay ─────────────────────────────────────────────── */
    #auth-gate {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #1e1e2e 0%, #2c2c3e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #auth-gate.hidden { display: none; }

    .auth-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      color: #fff;
      max-width: 340px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .auth-card img {
      width: 80px;
      height: auto;
      margin-bottom: 20px;
    }
    .auth-card h1 {
      font-size: 1.6rem;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .auth-card p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.65);
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .discord-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #5865F2;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    .discord-btn:hover { background: #4752c4; }
    .discord-btn svg { flex-shrink: 0; }

    /* ── User pill in header ───────────────────────────────────────────── */
    #user-info {
      display: none;
      align-items: center;
      gap: 8px;
    }
    #user-info.visible { display: flex; }
    #user-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
    }
    #user-name {
      font-size: 0.85rem;
      color: #333;
    }
    #logout-btn {
      font-size: 0.78rem;
      color: #5865F2;
      text-decoration: none;
      padding: 2px 6px;
      border-radius: 4px;
    }
    #logout-btn:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <!-- Auth gate — shown when not authenticated -->
  <div id="auth-gate" class="hidden">
    <div class="auth-card">
      <img src="/munchhat.png" alt="MunchHat logo" />
      <h1>MunchHat Map</h1>
      <p>Sign in with Discord to explore the MunchHat food adventure map.</p>
      <a href="/api/auth/login" class="discord-btn">
        <!-- Discord logo mark -->
        <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="#fff" aria-hidden="true">
          <path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0a105.89 105.89 0 0 0-26.25 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2a75.57 75.57 0 0 0 64.32 0c.87.71 1.76 1.39 2.66 2a68.68 68.68 0 0 1-10.87 5.19 77 77 0 0 0 6.89 11.1 105.25 105.25 0 0 0 32.19-16.14c2.64-27.38-4.51-51.11-18.9-72.15ZM42.45 65.69C36.18 65.69 31 60 31 53s5-12.74 11.43-12.74S54 46 53.89 53s-5.05 12.69-11.44 12.69Zm42.24 0C78.41 65.69 73.25 60 73.25 53s5-12.74 11.44-12.74S96.23 46 96.12 53s-5.04 12.69-11.43 12.69Z"/>
        </svg>
        Sign in with Discord
      </a>
    </div>
  </div>

  <div id="header">
    <img src="/munchhat.png" alt="MunchHat" style="height:32px;width:auto;vertical-align:middle;" />
    <h1>MunchHat Map</h1>
    <span id="pin-count">Loading pins…</span>
    <div id="user-info">
      <img id="user-avatar" src="" alt="" />
      <span id="user-name"></span>
      <a id="logout-btn" href="/api/auth/logout">Logout</a>
    </div>
  </div>
  <button id="stats-toggle" aria-expanded="false" title="View stats">📊</button>
  <div id="stats-panel" role="complementary" aria-label="Stats">
    <div class="stats-header">
      <h2>📊 Stats</h2>
      <button id="stats-close" aria-label="Close stats">✕</button>
    </div>
    <div id="stats-content">Loading stats…</div>
  </div>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Leaflet.markercluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
          integrity="sha384-eXVCORTRlv4FUUgS/xmOyr66XBVraen8ATNLMESp92FKXLAMiKkerixTiBvXriZr" crossorigin="anonymous"></script>

  <!-- Runtime config (sets window.API_BASE) — must load before main.js -->
  <script src="js/config.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
