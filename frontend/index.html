<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MunchHat Map 🎩</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }
    #map { width: 100vw; height: 100vh; }

    #header {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      border-radius: 8px;
      padding: 10px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }
    #header h1 { font-size: 1.1rem; }
    #pin-count { font-size: 0.85rem; color: #666; }

    .popup-content {
      max-width: 260px;
      font-family: sans-serif;
    }
    .popup-content img {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 8px;
      display: block;
    }
    .popup-content .meta {
      font-size: 0.8rem;
      color: #555;
      margin-top: 3px;
    }
    .popup-content .caption {
      font-size: 0.9rem;
      margin: 6px 0;
      word-break: break-word;
    }
    .popup-content a {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.8rem;
      color: #5865F2;
      text-decoration: none;
    }
    .popup-content a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="header">
    <h1>🎩 MunchHat Map</h1>
    <span id="pin-count">Loading pins…</span>
  </div>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLEo=" crossorigin=""></script>

  <script type="module" src="js/main.js"></script>
</body>
</html>
