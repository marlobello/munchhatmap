name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (prod)'
        required: true
        default: 'prod'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group (if not exists)
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [[ ! "$ENV" =~ ^(prod|staging|dev)$ ]]; then
            echo "ERROR: Invalid environment '$ENV'. Must be prod, staging, or dev."
            exit 1
          fi
          az group create \
            --name "rg-munchhatmap-${ENV}" \
            --location centralus \
            --tags "project=munchhatmap" "environment=${ENV}" \
            --output none

      - name: Deploy Bicep
        run: |
          ENV="${{ github.event.inputs.environment }}"
          az deployment group create \
            --resource-group "rg-munchhatmap-${ENV}" \
            --template-file infra/main.bicep \
            --parameters \
                env="${ENV}" \
                repositoryUrl=https://github.com/${{ github.repository }} \
                repositoryBranch=${{ github.ref_name }} \
            --output table

  redeploy-services:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Bot redeploy
        run: |
          gh workflow run deploy-bot.yml --ref ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Trigger API redeploy
        run: |
          gh workflow run deploy-api.yml --ref ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ github.token }}
